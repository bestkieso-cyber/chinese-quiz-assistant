<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中國文命題小幫手 V2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .mermaid { display: flex; justify-content: center; margin: 1rem 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-8 text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-700 tracking-wide">✏️ 國中國文命題小幫手 <span class="text-sm bg-blue-100 text-blue-700 px-2 py-1 rounded-full align-middle">V2.2 偵錯版</span></h1>
        <p class="text-slate-500 mt-2">支援自動偵測相容模型，解決 Not Found 問題</p>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-8">
        <div class="md:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-600 mb-1">🔑 Google Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="請貼上你的 API Key" class="w-full p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-400 text-sm">
            </div>
            <div class="mb-5 bg-slate-50 p-4 rounded-xl">
                <label class="block text-sm font-semibold text-slate-600 mb-2">📄 步驟一：提供原題</label>
                <textarea id="originalQuestion" placeholder="貼上原題文字..." class="w-full p-3 border border-slate-200 rounded-lg h-24 text-sm resize-none mb-2"></textarea>
                <input type="file" id="imageInput" accept="image/*" class="text-xs">
            </div>
            <div class="mb-6 bg-slate-50 p-4 rounded-xl">
                <label class="block text-sm font-semibold text-slate-600 mb-2">💡 步驟二：提供新素材</label>
                <textarea id="newMaterial" placeholder="貼上新文章..." class="w-full p-3 border border-slate-200 rounded-lg h-24 text-sm resize-none mb-2"></textarea>
                <input type="file" id="pdfInput" accept="application/pdf" class="text-xs">
            </div>
            <button id="generateBtn" onclick="generateQuestions()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 px-4 rounded-xl transition-all">🚀 開始自動命題</button>
            <p id="loadingText" class="text-center text-sm text-blue-600 mt-3 hidden animate-pulse">正在測試相容路徑並生成題目中...</p>
        </div>
        <div class="md:col-span-7 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 min-h-[600px] overflow-y-auto">
            <h2 class="text-lg font-bold text-slate-700 mb-4 border-b pb-2">📋 命題結果卡片</h2>
            <div id="outputArea" class="prose prose-slate max-w-none text-sm leading-relaxed">
                <p class="text-slate-400 text-center mt-20">請輸入資料後按下開始按鈕</p>
            </div>
        </div>
    </main>

    <script>
        const SYSTEM_PROMPT = `你是一位國中國文教學專家。請根據原題與素材，生成原題解析卡與兩題平行題卡。`;
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        window.onload = function() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        };

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve({ inlineData: { data: reader.result.split(',')[1], mimeType: file.type } });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function tryFetch(modelName, apiVersion, apiKey, userParts) {
            const url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: userParts }] })
            });
            return response;
        }

        async function generateQuestions() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) return alert("請輸入 API Key");
            localStorage.setItem('gemini_api_key', apiKey);

            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loadingText').classList.remove('hidden');
            const outputArea = document.getElementById('outputArea');
            outputArea.innerHTML = '<p class="text-blue-500">正在嘗試多種連線路徑...</p>';

            try {
                let userParts = [{ text: SYSTEM_PROMPT + "\n\n以下是輸入內容：\n" }];
                const qText = document.getElementById('originalQuestion').value;
                const mText = document.getElementById('newMaterial').value;
                const imgFile = document.getElementById('imageInput').files[0];
                const pdfFile = document.getElementById('pdfInput').files[0];

                userParts.push({ text: "【原題】\n" + qText });
                if (imgFile) userParts.push(await getBase64(imgFile));
                userParts.push({ text: "\n【素材】\n" + mText });
                if (pdfFile) userParts.push(await getBase64(pdfFile));

                // 準備多種模型嘗試路徑（依序測試：最新的 Flash -> 標準 Flash -> 舊版 Pro）
                const testConfigs = [
                    { name: 'gemini-1.5-flash-latest', ver: 'v1beta' },
                    { name: 'gemini-1.5-flash', ver: 'v1beta' },
                    { name: 'gemini-1.5-flash', ver: 'v1' },
                    { name: 'gemini-pro', ver: 'v1beta' }
                ];

                let lastError = "";
                let successfulData = null;

                for (const config of testConfigs) {
                    try {
                        const res = await tryFetch(config.name, config.ver, apiKey, userParts);
                        const data = await res.json();
                        if (data.candidates) {
                            successfulData = data;
                            break; // 成功就跳出循環
                        } else {
                            lastError = data.error ? data.error.message : "未知錯誤";
                        }
                    } catch (e) {
                        lastError = e.message;
                    }
                }

                if (!successfulData) {
                    throw new Error("所有連線嘗試皆失敗。最後一個錯誤訊息：" + lastError);
                }

                const aiText = successfulData.candidates[0].content.parts[0].text;
                outputArea.innerHTML = marked.parse(aiText);
                outputArea.querySelectorAll('pre code.language-mermaid').forEach(el => {
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.innerText = el.innerText;
                    el.parentElement.replaceWith(div);
                });
                await mermaid.run({ nodes: document.querySelectorAll('.mermaid') });

            } catch (error) {
                outputArea.innerHTML = `
                    <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-red-600 font-bold">連線失敗</p>
                        <p class="text-red-500 text-xs mt-2">${error.message}</p>
                        <hr class="my-2">
                        <p class="text-slate-600 text-xs">請確認：<br>
                        1. 您的 Key 是否為 AI Studio 產生的金鑰？<br>
                        2. 您的 Google 帳號是否有限制（如校園、公司帳號）？<br>
                        3. 如果持續失敗，建議申請一個新的 API Key 試試。</p>
                    </div>`;
            } finally {
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('loadingText').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
