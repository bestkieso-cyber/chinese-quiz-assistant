<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中國文單選題命題小幫手 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .mermaid { display: flex; justify-content: center; margin: 1rem 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-8 text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-700 tracking-wide">✏️ 國中國文 單選題命題小幫手 <span class="text-sm bg-blue-100 text-blue-700 px-2 py-1 rounded-full align-middle">V2 旗艦版</span></h1>
        <p class="text-slate-500 mt-2">支援圖片與 PDF 上傳，AI 自動解析並渲染圖表</p>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-8">
        
        <!-- 左側：輸入面板 -->
        <div class="md:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-600 mb-1">🔑 Google Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="請貼上你的 API Key (系統會自動記憶在您的電腦)" 
                    class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
            </div>

            <!-- 步驟一：原題區 -->
            <div class="mb-5 bg-slate-50 p-4 rounded-xl border border-slate-100">
                <label class="block text-sm font-semibold text-slate-600 mb-2">📄 步驟一：提供原題</label>
                <textarea id="originalQuestion" placeholder="請貼上文字（如果有的話）..." 
                    class="w-full p-3 border border-slate-200 rounded-lg h-24 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm resize-none mb-2"></textarea>
                
                <!-- 圖片上傳區 -->
                <label class="block text-xs font-medium text-slate-500 mb-1">或上傳原題圖片 (JPG/PNG)：</label>
                <input type="file" id="imageInput" accept="image/*" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <!-- 步驟二：新素材區 -->
            <div class="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                <label class="block text-sm font-semibold text-slate-600 mb-2">💡 步驟二：提供新素材</label>
                <textarea id="newMaterial" placeholder="請貼上新文章文字（如果有的話）..." 
                    class="w-full p-3 border border-slate-200 rounded-lg h-24 focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm resize-none mb-2"></textarea>
                
                <!-- PDF 上傳區 -->
                <label class="block text-xs font-medium text-slate-500 mb-1">或上傳新素材 PDF 檔：</label>
                <input type="file" id="pdfInput" accept="application/pdf" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>

            <button id="generateBtn" onclick="generateQuestions()" 
                class="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 px-4 rounded-xl transition-all flex justify-center items-center gap-2">
                <span>🚀 開始自動命題</span>
            </button>
            <p id="loadingText" class="text-center text-sm text-blue-600 mt-3 hidden animate-pulse">正在閱讀文本與畫圖中，需時較長(約 15~30 秒)，請稍候...</p>
        </div>

        <!-- 右側：結果展示區 -->
        <div class="md:col-span-7 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 min-h-[600px] overflow-y-auto">
            <h2 class="text-lg font-bold text-slate-700 mb-4 border-b pb-2">📋 命題結果卡片</h2>
            <div id="outputArea" class="prose prose-slate max-w-none text-sm leading-relaxed">
                <div class="text-slate-400 flex flex-col items-center justify-center h-64 text-center">
                    <span class="text-4xl mb-2">✨</span>
                    <p>尚未生成。</p>
                    <p>填寫左側資料或上傳檔案後，解析卡與平行題將在此浮現！</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        // 頁面載入時，自動把瀏覽器記憶的 API Key 填入
        window.onload = function() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        };

        const SYSTEM_PROMPT = `你是一位擅長課程、教學、評量設計的教育指令撰寫專家。
請依據使用者提供的「原題」與「新素材」（可能包含文字、圖片或 PDF），產出「原題解析卡」＋「平行題卡 ×2」。
勿逐步條列、勿重複說明流程，直接輸出卡片。

【前置辨識】辨識：題目類型、素材形式、選項形式、提問句式。

【卡片輸出格式】
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
◆ 原題解析卡
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【題型形式】 題目類型／素材形式／選項形式／提問句式
【評量點】   知識向度：＿＿　認知層次：＿＿　核心能力：＿＿
【命題用意】 說明此題意圖區辨學生哪種理解層次差異及典型迷思。
【仿作要點】 列出 3～5 項平行題必須複現的形式與要素

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
◆ 平行題卡 #1 (及 #2)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【素材】
※ 渲染規則：
- 表格：用 Markdown 表格語法。
- 統計圖/流程圖：使用 Mermaid 語法 (以 \`\`\`mermaid 包裝)。
- 圖片佔位：以文字描述構圖，標示【圖片佔位】。

【題幹】     ＿＿？
【選項】     (A)＿＿ (B)＿＿ (C)＿＿ (D)＿＿
【正答】     ＿
【解析】     正答：＿＿（理由一句話）
             誘答：(A/B/C/D) 對應迷思：＿＿ → 錯誤所在：＿＿（僅列非正答之選項）
【品質核可】 對照仿作要點，逐項標示 ✓ 或 △`;

        // 將檔案轉換為 AI 看得懂的 Base64 格式的輔助函數
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve({
                        inlineData: {
                            data: base64String,
                            mimeType: file.type
                        }
                    });
                };
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        async function generateQuestions() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const originalQuestionText = document.getElementById('originalQuestion').value.trim();
            const newMaterialText = document.getElementById('newMaterial').value.trim();
            const imageFile = document.getElementById('imageInput').files[0];
            const pdfFile = document.getElementById('pdfInput').files[0];
            
            if (!apiKey) return alert("請輸入 Gemini API Key！");
            if (!originalQuestionText && !imageFile) return alert("步驟一：請至少提供原題的「文字」或「圖片」！");
            if (!newMaterialText && !pdfFile) return alert("步驟二：請至少提供新素材的「文字」或「PDF」！");

            localStorage.setItem('gemini_api_key', apiKey);

            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').classList.add('opacity-50');
            document.getElementById('loadingText').classList.remove('hidden');
            const outputArea = document.getElementById('outputArea');
            outputArea.innerHTML = '';

            try {
                let userParts = [];
                // 1. 直接將指令放入第一段文字，這是最穩定的作法
                userParts.push({ text: SYSTEM_PROMPT + "\n\n請根據以下輸入進行命題作業：\n" });

                // 2. 處理原題
                userParts.push({ text: "【原題文字】\n" + (originalQuestionText || "(見附圖)") });
                if (imageFile) userParts.push(await getBase64(imageFile));

                // 3. 處理新素材
                userParts.push({ text: "\n\n【新素材】\n" + (newMaterialText || "(見附件 PDF)") });
                if (pdfFile) userParts.push(await getBase64(pdfFile));

                // 4. 使用 v1beta 搭配最新的模型名稱標籤
                // 注意：這裡改用 gemini-1.5-flash-latest，這是最不容易出錯的名稱
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: userParts
                        }]
                    })
                });

                const data = await response.json();

                // 偵錯輔助：如果還是失敗，顯示完整的錯誤原因
                if (data.error) {
                    throw new Error(`${data.error.status}: ${data.error.message}`);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                let htmlContent = marked.parse(aiText);
                htmlContent = htmlContent.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/gi, '<div class="mermaid">$1</div>');
                outputArea.innerHTML = htmlContent;

                try {
                    await mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
                } catch (e) { console.log("Mermaid 渲染失敗", e); }

            } catch (error) {
                // 這裡會顯示更詳細的錯誤，幫助我們判斷
                outputArea.innerHTML = `
                    <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                        <p class="text-red-600 font-bold">⚠️ 系統回應：</p>
                        <p class="text-red-500 text-sm mt-1">${error.message}</p>
                        <p class="text-slate-500 text-xs mt-4">提示：如果持續出現 'not found'，請確認您的 API Key 是否為 Google AI Studio 產生的「Gemini Key」。</p>
                    </div>`;
            } finally {
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('generateBtn').classList.remove('opacity-50');
                document.getElementById('loadingText').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
